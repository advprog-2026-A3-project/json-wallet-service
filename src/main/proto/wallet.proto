syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.json.demo.grpc";
option java_outer_classname = "WalletProto";

package wallet;

service WalletGrpcService {
  rpc GetWalletByUserId (GetWalletRequest) returns (WalletResponse);
  rpc CreateWallet (CreateWalletRequest) returns (WalletResponse);
  rpc TopUp (WalletAmountRequest) returns (WalletResponse);
  rpc Withdraw (WalletAmountRequest) returns (WalletResponse);
}

message GetWalletRequest {
  string user_id = 1;
}

message CreateWalletRequest {
  string user_id = 1;
  string initial_balance = 2;
}

message WalletAmountRequest {
  string user_id = 1;
  string amount = 2;
}

message WalletResponse {
  string id = 1;
  string user_id = 2;
  string balance = 3;
  string created_at = 4;
  string updated_at = 5;
}

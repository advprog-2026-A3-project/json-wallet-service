name: AWS EC2 CD

on:
  push:
    branches: ["staging", "main", "infra/wallet-deployment"]
  workflow_dispatch:

jobs:
  deploy_ec2:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      IMAGE_NAME: json-wallet-service
      CONTAINER_NAME: json-wallet-service
      DB_CONTAINER_NAME: json-wallet-db
      DB_VOLUME_NAME: json-wallet-db-data
      DOCKER_NETWORK: json-wallet-network
      APP_PORT: 8081
      APP_INTERNAL_PORT: 8080
      POSTGRES_DB: ${{ secrets.WALLET_DB_NAME || 'json_wallet' }}
      POSTGRES_USER: ${{ secrets.WALLET_DB_USERNAME || 'postgres' }}
      POSTGRES_PASSWORD: ${{ secrets.WALLET_DB_PASSWORD }}
      SSH_PORT: ${{ secrets.AWS_EC2_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" -t "$IMAGE_NAME:latest" .

      - name: Export Docker image
        run: docker save "$IMAGE_NAME:latest" | gzip > "$IMAGE_NAME.tar.gz"

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          EC2_USER: ${{ secrets.AWS_EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "Missing AWS EC2 SSH secrets."
            exit 1
          fi
          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "Missing WALLET_DB_PASSWORD secret."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload Docker image to EC2
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          EC2_USER: ${{ secrets.AWS_EC2_USER }}
        run: scp -P "$SSH_PORT" -i ~/.ssh/ec2_key "$IMAGE_NAME.tar.gz" "$EC2_USER@$EC2_HOST:/tmp/$IMAGE_NAME.tar.gz"

      - name: Deploy containers on EC2
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          EC2_USER: ${{ secrets.AWS_EC2_USER }}
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            sudo docker network create $DOCKER_NETWORK || true

            if ! sudo docker ps -a --format '{{.Names}}' | grep -Fxq '$DB_CONTAINER_NAME'; then
              sudo docker volume create $DB_VOLUME_NAME
              sudo docker run -d \
                --name $DB_CONTAINER_NAME \
                --restart unless-stopped \
                --network $DOCKER_NETWORK \
                -v $DB_VOLUME_NAME:/var/lib/postgresql/data \
                -e POSTGRES_DB='$POSTGRES_DB' \
                -e POSTGRES_USER='$POSTGRES_USER' \
                -e POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
                postgres:16
            else
              sudo docker start $DB_CONTAINER_NAME || true
              sudo docker network connect $DOCKER_NETWORK $DB_CONTAINER_NAME || true
            fi

            until sudo docker exec $DB_CONTAINER_NAME pg_isready -U '$POSTGRES_USER' -d '$POSTGRES_DB'; do
              sleep 2
            done

            sudo docker load -i /tmp/$IMAGE_NAME.tar.gz
            sudo docker rm -f $CONTAINER_NAME || true
            sudo docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --network $DOCKER_NETWORK \
              -p $APP_PORT:$APP_INTERNAL_PORT \
              -e DB_URL='jdbc:postgresql://$DB_CONTAINER_NAME:5432/$POSTGRES_DB' \
              -e DB_USERNAME='$POSTGRES_USER' \
              -e DB_PASSWORD='$POSTGRES_PASSWORD' \
              $IMAGE_NAME:latest
            rm -f /tmp/$IMAGE_NAME.tar.gz
          "

      - name: Smoke test EC2 health endpoint
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
        run: |
          sleep 25
          curl --fail --silent --show-error "http://$EC2_HOST:$APP_PORT/actuator/health" | grep '"status":"UP"'

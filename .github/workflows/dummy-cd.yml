name: CD (Guarded by CI)

on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    types: [completed]

jobs:
  deploy:
    name: Test and Deploy to Heroku
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' 
        )
      }}
    runs-on: ubuntu-22.04
    environment:
      name: production
      url: https://wallet-jastip-1c28ffa49260.herokuapp.com/

    steps:
      - name: Checkout the same commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false
          dontautocreate: true

      - name: Publish deploy link
        run: |
          echo "### Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "https://wallet-jastip-1c28ffa49260.herokuapp.com/" >> $GITHUB_STEP_SUMMARY